services:
  db:
    image: postgres:15-alpine
    container_name: blog_postgres
    env_file:
      - ${BLOGPROJECT_PATH}/.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: blog_redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: blog_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${AMQP_USER}
      RABBITMQ_DEFAULT_PASS: ${AMQP_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  mongo:
    image: mongo:6
    container_name: blog_mongo
    command: mongod --wiredTigerCacheSizeGB 0.25
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  rabbitmq-init:
    image: python:3.12-slim
    container_name: blog_rabbitmq_init
    depends_on:
      - rabbitmq
    volumes:
      - ${BLOGSERVICES_PATH}:/app
    working_dir: /app
    env_file:
      - ${BLOGSERVICES_PATH}/.env
    command: >
      bash -c "pip install pika python-dotenv && sleep 10 && python init_rabbitmq.py"

  nginx:
    image: nginx:alpine
    container_name: blog_nginx
    ports:
      - "80:80"
    volumes:
      - ${BLOGSERVICES_PATH}/nginx.local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - blogmain
      - recommendation

  blogmain:
    container_name: blogmain
    build: ${BLOGPROJECT_PATH}
    depends_on:
      - db
      - redis
      - rabbitmq
      - mongo
    volumes:
      - ${BLOGPROJECT_PATH}:/app
      - ./media:/app/media
    env_file:
      - ${BLOGPROJECT_PATH}/.env
      - ${BLOGPROJECT_PATH}/.env.docker
    ports:
      - "8000:8000"

  recommendation:
    container_name: blog_recommendation
    build: ${BLOGSERVICES_PATH}/recommendation
    depends_on:
      rabbitmq-init:
        condition: service_completed_successfully
      mongo:
        condition: service_started
      blogmain:
        condition: service_started
    volumes:
      - ${BLOGSERVICES_PATH}/recommendation:/app
    env_file:
      - ${BLOGSERVICES_PATH}/recommendation/.env
    ports:
      - "8001:8001"

  notification:
    container_name: blog_notification
    build: ${BLOGSERVICES_PATH}/notification
    depends_on:
      rabbitmq-init:
        condition: service_completed_successfully
      mongo:
        condition: service_started
    volumes:
      - ${BLOGSERVICES_PATH}/notification:/app
    env_file:
      - ${BLOGSERVICES_PATH}/notification/.env

  events:
    container_name: blog_events
    build: ${BLOGSERVICES_PATH}/events
    depends_on:
      rabbitmq-init:
        condition: service_completed_successfully
      mongo:
        condition: service_started
    volumes:
      - ${BLOGSERVICES_PATH}/events:/app
    env_file:
      - ${BLOGSERVICES_PATH}/events/.env

volumes:
  postgres_data:
  rabbitmq_data:
  mongo_data:

networks:
  default:
    name: blog_network